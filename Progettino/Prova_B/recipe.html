<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dettaglio ricetta</title>
</head>
<body class="bg-light">

    <div class="container py-5">
        <!-- Qui ci metto i dati della ricetta -->
     <div id="contenutoRicetta">
        <p class="text-center">Caricamento ...</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /*uso 1 per prendere la seconda parte non la prima avnedo usasto split*/
        const id = window.location.href.split("?id=")[1];
        console.log(window.location.href);
        
        const contenuto = document.getElementById("contenutoRicetta");

        //Se non tovo id nella URL mostro un errore
        if (!id) {
            contenuto.innerHTML = '<p class="text-danger text-center">ID ricetta non trovato!</p>';
        } else {
            caricaRicetta(id);
        }

        async function caricaRicetta(id) {
            const resp = await fetch("https://www.themealdb.com/api/json/v1/1/lookup.php?i=" + id);
            const data = await resp.json();

            //assicuro che l'API abbia trovato qualcosa
            if (!data.meals) {
                contenuto.innerHTML = '<p class="text-danger text-center">Ricetta non trovata!</p>';
                return;
            }

            const meal = data.meals[0];
            console.log(meal);
            //creo la lista ingredienti
            //API ha max 20 ingrdienti
            let listaIngredienti = "<ul>";
            for (let i = 1; i <= 20; i++) {
                const ingrediente = meal["strIngredient" + i];
               const misura = meal["strMeasure" + i];

                if (ingrediente && ingrediente.trim() != "") {
                    listaIngredienti += "<li>" + misura + " " + ingrediente + "</li>";
                }
            }
            listaIngredienti += "</ul>";

            //costruisco la pagina con i dati
            contenuto.innerHTML =
                '<div class="row">' +

                    '<div class="col-md-4 text-center">' +
                        '<img src="' + meal.strMealThumb + '" class="img-fluid rounded shadow mb-3">' +
                    '</div>' +

                    '<div class="col-md-8">' +
                        '<h2>' + meal.strMeal + '</h2>' +
                       '<p><strong>Categoria:</strong> ' + meal.strCategory + '</p>' +
                    '<p><strong>Cucina:</strong> ' + meal.strArea + '</p>' +

                        '<h5 class="mt-4">Ingredienti</h5>' +
                        listaIngredienti +

                        '<h5 class="mt-4">Procedimento</h5>' +
                        '<p>' + meal.strInstructions + '</p>' +
                    '</div>' +
                '</div>';}

    </script>

</body>
</html>
